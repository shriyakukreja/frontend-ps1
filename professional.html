<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Portfolio</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: white;
      color: #111827;
      padding: 50px;
      max-width: 1000px;
      margin: auto;
      line-height: 1.7;
    }

    .section {
      margin-top: 50px;
      padding-top: 30px;
      border-top: 1px solid #e5e7eb;
    }

    h1 {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .email {
      color: #475569;
      margin-bottom: 20px;
    }

    .summary {
      max-width: 700px;
      color: #374151;
    }
  </style>
</head>
<body>

  <!-- Hero Section -->
  <section>
    <h1>{{name}}</h1>
    <p class="email">{{email}}</p>
    <p class="summary">{{summary}}</p>
  </section>

  <!-- Skills -->
  <section class="section">
    <h2>Skills</h2>
    <div>
      {{skills}}
    </div>
  </section>

  <!-- Projects -->
  <section class="section">
    <h2>Projects</h2>
    <div>
      {{projects}}
    </div>
  </section>

  <!-- Education -->
  <section class="section">
    <h2>Education</h2>
    <div>
      {{education}}
    </div>
  </section>

  <!-- Experience -->
  <section class="section">
    <h2>Experience</h2>
    <div>
      {{experience}}
    </div>
  </section>

</body>
</html>
